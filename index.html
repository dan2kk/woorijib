<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아파트 실거래가 (비공개)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--line:#262b36;--txt:#e6e9ef;--mut:#8b93a3;
    --accent:#4f8cff;--hi:#ffce4f;--hibg:#2a2410;--apt:#4f8cff;--opi:#9b6bff;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  /* ---- gate ---- */
  #gate{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at 50% 30%,#1a1f2b,#0a0c10);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  #gate .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px 26px;
    width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  #gate h2{margin:0 0 6px;font-size:17px}
  #gate p{margin:0 0 18px;font-size:12px;color:var(--mut);line-height:1.6}
  #gate input{width:100%;padding:11px 13px;font-size:18px;letter-spacing:4px;text-align:center;
    background:#0e1117;border:1px solid var(--line);border-radius:9px;color:var(--txt);outline:none}
  #gate input:focus{border-color:var(--accent)}
  #gate button{width:100%;margin-top:12px;padding:11px;font-size:14px;font-weight:700;border:none;
    border-radius:9px;background:var(--accent);color:#fff;cursor:pointer}
  #gate button:disabled{opacity:.5;cursor:wait}
  #gate .err{color:#ff6b6b;font-size:12px;min-height:16px;margin-top:10px}
  #gate .warn{font-size:10.5px;color:#5d6472;margin-top:14px;line-height:1.5}
  /* ---- app (hidden until unlock) ---- */
  #app{display:none;height:100%;flex-direction:column}
  header{padding:14px 18px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:16px;font-weight:700}
  header p{margin:4px 0 0;font-size:12px;color:var(--mut)}
  header .keyhint{color:#ffce4f}
  .tabs{display:flex;gap:4px;padding:8px 14px 0;border-bottom:1px solid var(--line);background:var(--panel);
    overflow-x:auto;white-space:nowrap}
  .tab{padding:9px 15px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;
    border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;flex:0 0 auto}
  .tab.active{color:var(--txt);background:var(--bg);border-color:var(--line)}
  .filters{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);
    background:var(--bg);font-size:12px}
  .fgroup{display:flex;align-items:center;gap:4px}
  .flabel{color:var(--mut);font-size:11px;margin-right:2px}
  .fbtn{padding:5px 10px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--mut);
    cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
  .fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .fsel{padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--txt);font-size:12px}
  .fsearch{padding:5px 9px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--txt);font-size:12px;width:120px;outline:none}
  .fsearch:focus{border-color:var(--accent)}
  .fcount{margin-left:auto;color:var(--mut);font-size:11.5px}
  .fcount b{color:var(--hi)}
  .summary{margin:0 0 10px;padding:8px 11px;background:rgba(79,140,255,.08);border:1px solid #2c3950;
    border-radius:8px;font-size:12px;color:var(--mut)} .summary b{color:var(--accent);font-weight:700}
  .freset{padding:5px 9px;border:1px solid var(--line);border-radius:7px;background:transparent;color:var(--mut);cursor:pointer;font-size:11.5px}
  .card.hidden{display:none}
  .star{margin-left:auto;font-size:16px;color:#3a4150;cursor:pointer;user-select:none;line-height:1}
  .star.on{color:#ffce4f}
  .wrap{display:flex;flex:1;min-height:0}
  #map{flex:1;min-width:0;height:100%}
  .side{width:46%;max-width:680px;min-width:340px;overflow-y:auto;border-left:1px solid var(--line);padding:12px 14px 60px}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--mut);margin:0 0 10px;padding:8px 10px;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;flex-wrap:wrap}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .card{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden;background:var(--panel);
    scroll-margin-top:10px;transition:border-color .15s,box-shadow .15s}
  .card.hi{border-color:var(--hi);box-shadow:0 0 0 2px rgba(255,206,79,.25)}
  .card h2{margin:0;font-size:15px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;
    background:linear-gradient(0deg,transparent,rgba(255,255,255,.02))}
  .card.hi h2{background:var(--hibg)}
  .badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;color:#fff}
  .badge.apt{background:var(--apt)} .badge.opi{background:var(--opi)}
  .meta{font-size:12px;color:var(--mut);padding:0 13px 10px;line-height:1.7}
  .meta b{color:var(--txt);font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{padding:7px 10px;text-align:right;border-top:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  thead th{color:var(--mut);font-weight:600;font-size:11px;background:rgba(255,255,255,.02)}
  td.py{color:var(--accent);font-weight:600}
  .ppy{color:#6b7280;font-size:10.5px}
  .notx{padding:10px 13px;font-size:12.5px;color:#ff8a8a}
  .pin{background:var(--apt);width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .pin.opi{background:var(--opi)} .pin.notx{background:#5a6172}
  .pin b{transform:rotate(45deg);color:#fff;font-size:11px;font-weight:800}
  .pin.act{background:var(--hi);transform:rotate(-45deg) scale(1.25);z-index:1000}
  .pin.act b{color:#231d00}
  .nv-pop{background:#171a21;color:#e6e9ef;border:1px solid #3a4150;border-radius:8px;padding:8px 11px;
    font-size:12px;line-height:1.5;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .nv-pop b{font-size:13px;color:#fff}
  /* ===== 모바일 반응형 ===== */
  @media (max-width:768px){
    header{padding:10px 12px}
    header h1{font-size:13px;line-height:1.35}
    header p{font-size:10px}
    .tabs{padding:6px 10px 0} .tab{padding:8px 12px;font-size:12.5px}
    .filters{padding:8px 10px;gap:6px;font-size:11px}
    .fbtn,.fsel,.fsearch{padding:6px 9px;font-size:12px}
    .fsearch{width:100px}
    .fcount{width:100%;margin-left:0;order:99;text-align:right}
    .wrap{flex-direction:column}
    #map{flex:none;width:100%;height:42vh;min-height:240px}
    .side{width:100%;max-width:none;min-width:0;border-left:none;border-top:1px solid var(--line);
      flex:1;padding:10px 12px 80px}
    .gate .box,#gate .box{width:88vw;max-width:340px}
    table{font-size:12px} th,td{padding:6px 7px}
  }
  @media (max-width:768px) and (orientation:landscape){
    #map{height:60vh}
  }
</style>
</head>
<body>
<!-- 비밀번호 게이트 -->
<div id="gate">
  <div class="box">
    <h2>🔒 비공개 열람</h2>
    <p>접근 비밀번호를 입력하세요</p>
    <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••" maxlength="32"/>
    <button id="unlock">열기</button>
    <div class="err" id="err"></div>
    <div class="warn">데이터는 AES-GCM 암호화되어 저장됨. 올바른 비밀번호로만 복호화됨.<br>
      ⚠️ 단순 가림막 수준 — 강한 보안 아님. 민감정보 공개금지.</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <header>
    <h1>경의중앙선·3호선 코리도 아파트 실거래가 — 일산 하늘마을 ~ DMC ~ 마포 / 서북3호선</h1>
    <p>출처: 아실(asil.kr) · 매매 실거래가 · 기준 2026-06-25 · 기준점 중산동 하늘마을2단지 · 을지로입구(2)/종로3가(1·3·5) 통근축 · 핀↔표 상호 하이라이트<span class="keyhint" id="mapmode"></span></p>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="filters" id="filters">
    <div class="fgroup" style="margin-right:6px">
      <button class="fbtn on" id="modeSale" data-mode="sale">매매</button>
      <button class="fbtn" id="modeJeonse" data-mode="jeonse">전세</button></div>
    <div class="fgroup"><button class="fbtn" data-f="solo">나홀로 제외</button>
      <button class="fbtn" id="ffav">★ 즐겨찾기</button></div>
    <div class="fgroup"><span class="flabel">평형</span>
      <button class="fbtn" data-py="0">~19평</button>
      <button class="fbtn" data-py="20">20평대</button>
      <button class="fbtn" data-py="30">30평대</button>
      <button class="fbtn" data-py="40">40평+</button></div>
    <div class="fgroup"><span class="flabel">최근실거래</span>
      <select class="fsel" id="fprice">
        <option value="0">전체</option>
        <option value="60000">6억 이하</option>
        <option value="90000">9억 이하</option>
        <option value="120000">12억 이하</option>
        <option value="-120000">12억 초과</option>
      </select></div>
    <div class="fgroup"><span class="flabel">준공</span>
      <select class="fsel" id="fyear">
        <option value="0">전체</option>
        <option value="2015">2015년~</option>
        <option value="2005-2014">2005~2014</option>
        <option value="-2004">~2004</option>
      </select></div>
    <div class="fgroup"><span class="flabel">정렬</span>
      <select class="fsel" id="fsort">
        <option value="">기본</option>
        <option value="price-desc">가격 높은순</option>
        <option value="price-asc">가격 낮은순</option>
        <option value="house-desc">세대 많은순</option>
        <option value="year-desc">신축순</option>
        <option value="year-asc">오래된순</option>
      </select></div>
    <div class="fgroup"><input class="fsearch" id="fsearch" type="text" placeholder="단지명 검색" autocomplete="off"></div>
    <button class="freset" id="freset">초기화</button>
    <span class="fcount" id="fcount"></span>
  </div>
  <div class="wrap"><div id="map"></div><div class="side" id="side"></div></div>
</div>

<script>
// 네이버 키는 암호화 블롭(DATA.naverKey) 안에 있음 — 비번 풀어야 로드됨. 평문 키 없음.

/* ============ 복호화 게이트 ============ */
const ENC=JSON.parse(document.getElementById('enc').textContent);
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  if(!crypto||!crypto.subtle) throw new Error('insecure-context');
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iters,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
const gate=document.getElementById('gate'), pwIn=document.getElementById('pw'),
      errEl=document.getElementById('err'), btn=document.getElementById('unlock');
async function tryUnlock(){
  const pw=pwIn.value.trim(); if(!pw) return;
  btn.disabled=true; errEl.textContent='복호화 중…';
  try{
    const DATA=await decrypt(pw);
    sessionStorage.setItem('ok','1');
    gate.style.display='none';
    document.getElementById('app').style.display='flex';
    boot(DATA);
  }catch(e){
    btn.disabled=false;
    errEl.textContent = e.message==='insecure-context'
      ? 'localhost/https에서 열어야 함 (file:// 불가)'
      : '비밀번호가 틀렸습니다';
    pwIn.value=''; pwIn.focus();
  }
}
btn.addEventListener('click',tryUnlock);
pwIn.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
window.addEventListener('DOMContentLoaded',()=>pwIn.focus());

/* ============ 앱 (복호화 성공 후 boot) ============ */
let markers={}, cards={}, active=null, MAP=null, backend=null, curDong=null, DATA=null, MODE='sale';
function gSizes(c){return MODE==='sale'?(c.sizes||[]):(c.sizesS||[]);}
function gNotx(c){return gSizes(c).length===0;}
function gRecent(c){return MODE==='sale'?c.priceRecent:c.priceRecentS;}
let FAVS=new Set();
try{FAVS=new Set(JSON.parse(localStorage.getItem('favs')||'[]'));}catch(e){}
function saveFavs(){try{localStorage.setItem('favs',JSON.stringify([...FAVS]));}catch(e){}}
function toggleFav(seq,el){if(FAVS.has(seq)){FAVS.delete(seq);el.classList.remove('on');}else{FAVS.add(seq);el.classList.add('on');}saveFavs();if(FILT.fav)applyFilter();}
function priceMan(s){ // "2026.06.07 11억 4,000만 (8층)" -> 114000
  const m=s.match(/(\d+)\s*억/); let v=m?+m[1]*10000:0;
  const r=s.replace(/\d+\s*억/,'').match(/([\d,]+)\s*만/); if(r)v+=+r[1].replace(/,/g,''); return v;}
function ppyOf(s){const v=priceMan(s.latest); return s.py?Math.round(v/s.py):0;}
function pinHTML(c,idx){const cls='pin'+(c.type!=='아파트'?' opi':'')+(c.notx?' notx':'');
  return `<div class="${cls}" id="pin-${c.seq}" data-seq="${c.seq}"><b>${idx}</b></div>`;}
function popHTML(c,idx){return `<div class="nv-pop"><b>${idx}. ${c.name}</b><br>준공 ${c.year} · `+
  `${c.dong!=='0'?c.dong+'개동':'—'} · ${c.floors?c.floors+'층':'층정보없음'} · ${c.households}세대</div>`;}
function pinEl(seq){return document.getElementById('pin-'+seq);}
function setActive(seq){
  if(active){const p=pinEl(active);p&&p.classList.remove('act');cards[active]&&cards[active].classList.remove('hi');}
  active=seq; const p=pinEl(seq);p&&p.classList.add('act'); cards[seq].classList.add('hi');}
function focusFromPin(seq){setActive(seq);cards[seq].scrollIntoView({behavior:'smooth',block:'start'});window.openPop(seq);}
function focusFromCard(seq){setActive(seq);window.panTo(seq);window.openPop(seq);}
function cur(seq){const i=curDong.complexes.findIndex(x=>x.seq===seq);return i<0?null:{c:curDong.complexes[i],i:i+1};}
function renderSide(d){
  const side=document.getElementById('side'); side.innerHTML='';
  side.insertAdjacentHTML('beforeend',
    `<div class="legend"><span><i class="dot" style="background:var(--apt)"></i>아파트</span>
     <span><i class="dot" style="background:var(--opi)"></i>오피스텔/주상복합</span>
     <span><i class="dot" style="background:#5a6172"></i>매매 거래없음(임대 등)</span></div>`);
  // 동 요약 통계 (모드 반영)
  const pr=d.complexes.map(gRecent).filter(v=>v!=null);
  const lbl=MODE==='sale'?'매매':'전세';
  const eok=v=>(v/10000).toFixed(1)+'억';
  if(pr.length){
    const avg=Math.round(pr.reduce((a,b)=>a+b,0)/pr.length);
    side.insertAdjacentHTML('beforeend',
      `<div class="summary">${d.name} · ${d.complexes.length}단지 (${lbl} ${pr.length}) · 평균 <b>${eok(avg)}</b> · 범위 ${eok(Math.min(...pr))}~${eok(Math.max(...pr))}</div>`);
  }else{
    side.insertAdjacentHTML('beforeend',`<div class="summary">${d.name} · ${d.complexes.length}단지 · ${lbl} 데이터 없음</div>`);
  }
  cards={};
  d.complexes.forEach((c,i)=>{
    const idx=i+1, card=document.createElement('div'); card.className='card'; card.id='card-'+c.seq;
    const badge=c.type==='아파트'?'<span class="badge apt">APT</span>':'<span class="badge opi">주복</span>';
    const sz=gSizes(c), label=MODE==='sale'?'매매':'전세';
    let rows;
    if(!sz.length){rows=`<div class="notx">⚠️ ${label} 실거래 없음 (${MODE==='jeonse'?'전세 미수집/거래없음':'임대단지/신축 미거래 등'})</div>`;}
    else{rows=`<table><thead><tr><th>전용</th><th>평형</th><th>건수</th><th>최저~최고</th><th>최근 ${label}</th></tr></thead><tbody>`;
      sz.forEach(s=>{rows+=`<tr><td>${s.m2}㎡</td><td class="py">${s.py}평</td><td>${s.count}</td><td>${s.min} ~ ${s.max}</td><td>${s.latest}<br><span class="ppy">평단 ${ppyOf(s).toLocaleString()}만</span></td></tr>`;});
      rows+=`</tbody></table>`;}
    const fav=FAVS.has(c.seq)?' on':'';
    card.innerHTML=`<h2>${badge}<span>${idx}. ${c.name}</span><span class="star${fav}" title="즐겨찾기">★</span></h2>`+
      `<div class="meta">준공 <b>${c.year}년</b> · 동수 <b>${c.dong!=='0'?c.dong+'개동':'—'}</b> · `+
      `최고층 <b>${c.floors?c.floors+'층':'—'}</b> · 세대수 <b>${c.households}세대</b></div>`+rows;
    card.querySelector('h2').addEventListener('click',e=>{
      if(e.target.classList.contains('star')){toggleFav(c.seq,e.target);return;}
      focusFromCard(c.seq);});
    side.appendChild(card); cards[c.seq]=card;
  });
}
function renderTab(d){curDong=d;active=null;renderSide(d);window.buildMarkers(d);applyFilter();applySort();}

/* ---- 필터 ---- */
const FILT={solo:false,py:new Set(),price:0,year:'0',search:'',sort:'',fav:false};
function pyPass(c){
  if(!FILT.py.size)return true;
  const sz=gSizes(c); if(!sz.length)return false;
  return sz.some(s=>{const p=s.py;
    return (FILT.py.has('0')&&p<20)||(FILT.py.has('20')&&p>=20&&p<30)||
           (FILT.py.has('30')&&p>=30&&p<40)||(FILT.py.has('40')&&p>=40);});
}
function pricePass(c){const v=FILT.price;if(!v)return true;
  const pr=gRecent(c); if(pr==null)return false;
  return v>0?pr<=v:pr>-v;}
function yearPass(c){const y=FILT.year;if(y==='0')return true;const yr=parseInt(c.year)||0;
  if(y==='2015')return yr>=2015; if(y==='2005-2014')return yr>=2005&&yr<=2014; if(y==='-2004')return yr<=2004; return true;}
function applyFilter(){
  if(!curDong)return; let vis=0;
  const q=FILT.search.trim().toLowerCase();
  curDong.complexes.forEach(c=>{
    const pass=(!FILT.solo||!c.solo)&&(!FILT.fav||FAVS.has(c.seq))&&pyPass(c)&&pricePass(c)&&yearPass(c)&&(!q||c.name.toLowerCase().includes(q));
    if(cards[c.seq])cards[c.seq].classList.toggle('hidden',!pass);
    if(window.showMarker)window.showMarker(c.seq,pass);
    if(pass)vis++;
  });
  const fc=document.getElementById('fcount'); if(fc)fc.innerHTML=`표시 <b>${vis}</b> / ${curDong.complexes.length}`;
}
function applySort(){
  if(!curDong)return; const k=FILT.sort; const side=document.getElementById('side');
  let arr=curDong.complexes.slice();
  if(k){
    const num=s=>parseInt(String(s).replace(/[^0-9]/g,''))||0;
    arr.sort((a,b)=>{
      if(k==='price-desc')return (gRecent(b)||-1)-(gRecent(a)||-1);
      if(k==='price-asc')return (gRecent(a)||1e9)-(gRecent(b)||1e9);
      if(k==='house-desc')return num(b.households)-num(a.households);
      if(k==='year-desc')return num(b.year)-num(a.year);
      if(k==='year-asc')return num(a.year)-num(b.year);
      return 0;
    });
  }
  arr.forEach(c=>{const el=cards[c.seq]; if(el)side.appendChild(el);});
}
function wireFilters(){
  const mS=document.getElementById('modeSale'), mJ=document.getElementById('modeJeonse');
  function setMode(m){MODE=m; mS.classList.toggle('on',m==='sale'); mJ.classList.toggle('on',m==='jeonse');
    if(curDong){renderSide(curDong);applyFilter();applySort();}}
  mS.addEventListener('click',()=>setMode('sale'));
  mJ.addEventListener('click',()=>setMode('jeonse'));
  const solo=document.querySelector('[data-f=solo]');
  solo.addEventListener('click',()=>{FILT.solo=!FILT.solo;solo.classList.toggle('on',FILT.solo);applyFilter();});
  const fav=document.getElementById('ffav');
  fav.addEventListener('click',()=>{FILT.fav=!FILT.fav;fav.classList.toggle('on',FILT.fav);applyFilter();});
  document.querySelectorAll('[data-py]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.py; FILT.py.has(k)?FILT.py.delete(k):FILT.py.add(k); b.classList.toggle('on'); applyFilter();}));
  document.getElementById('fprice').addEventListener('change',e=>{FILT.price=parseInt(e.target.value);applyFilter();});
  document.getElementById('fyear').addEventListener('change',e=>{FILT.year=e.target.value;applyFilter();});
  document.getElementById('fsort').addEventListener('change',e=>{FILT.sort=e.target.value;applySort();});
  document.getElementById('fsearch').addEventListener('input',e=>{FILT.search=e.target.value;applyFilter();});
  document.getElementById('freset').addEventListener('click',()=>{
    FILT.solo=false;FILT.fav=false;FILT.py.clear();FILT.price=0;FILT.year='0';FILT.search='';FILT.sort='';
    document.querySelectorAll('.fbtn:not([data-mode])').forEach(b=>b.classList.remove('on'));
    document.getElementById('fprice').value='0';document.getElementById('fyear').value='0';
    document.getElementById('fsort').value='';document.getElementById('fsearch').value='';applyFilter();applySort();});
}
function initNaver(){
  backend='naver'; document.getElementById('mapmode').textContent=' · 지도: 네이버';
  MAP=new naver.maps.Map('map',{zoom:13,mapTypeControl:true});
  let pop=null;
  window.panTo=seq=>MAP.panTo(markers[seq].getPosition());
  window.openPop=seq=>{const x=cur(seq);if(!x)return;if(pop)pop.close();
    pop=new naver.maps.InfoWindow({content:popHTML(x.c,x.i),borderWidth:0,backgroundColor:'transparent',disableAnchor:true,pixelOffset:new naver.maps.Point(0,-14)});
    pop.open(MAP,markers[seq].getPosition());};
  window.showMarker=(seq,vis)=>{const m=markers[seq];if(m)m.setMap(vis?MAP:null);};
  window.buildMarkers=d=>{Object.values(markers).forEach(m=>m.setMap(null));markers={};
    d.complexes.forEach((c,i)=>{const m=new naver.maps.Marker({position:new naver.maps.LatLng(c.lat,c.lng),map:MAP,
      icon:{content:pinHTML(c,i+1),anchor:new naver.maps.Point(13,26)}});
      naver.maps.Event.addListener(m,'click',()=>focusFromPin(c.seq));markers[c.seq]=m;});
    MAP.setCenter(new naver.maps.LatLng(d.center[0],d.center[1]));MAP.setZoom(14);};
  startTabs();
}
function initLeaflet(){
  backend='leaflet'; document.getElementById('mapmode').textContent=' · 지도: OSM(무키) — 네이버는 NAVER_KEY 입력';
  MAP=L.map('map');
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',maxZoom:19}).addTo(MAP);
  let layer=null;
  window.panTo=seq=>MAP.panTo(markers[seq].getLatLng());
  window.openPop=seq=>markers[seq].openPopup();
  window.showMarker=(seq,vis)=>{const m=markers[seq];if(!m)return;if(vis){if(!MAP.hasLayer(m))m.addTo(MAP);}else m.remove();};
  window.buildMarkers=d=>{Object.values(markers).forEach(m=>m.remove());markers={};
    d.complexes.forEach((c,i)=>{const icon=L.divIcon({className:'',html:pinHTML(c,i+1),iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-26]});
      const m=L.marker([c.lat,c.lng],{icon}).addTo(MAP);m.bindPopup(popHTML(c,i+1));m.on('click',()=>focusFromPin(c.seq));markers[c.seq]=m;});
    MAP.setView(d.center,14);};
  startTabs();
}
function startTabs(){
  const tabsEl=document.getElementById('tabs'); tabsEl.innerHTML='';
  DATA.dongs.forEach((d,i)=>{const t=document.createElement('div');t.className='tab';t.textContent=d.name;
    t.addEventListener('click',()=>{[...tabsEl.children].forEach(x=>x.classList.remove('active'));t.classList.add('active');
      location.hash=encodeURIComponent(d.name); renderTab(d);});
    tabsEl.appendChild(t);});
  // URL 해시로 마지막 본 동 복원
  const want=decodeURIComponent((location.hash||'').replace('#',''));
  let idx=DATA.dongs.findIndex(d=>d.name===want); if(idx<0)idx=0;
  tabsEl.children[idx].classList.add('active'); renderTab(DATA.dongs[idx]);
  try{tabsEl.children[idx].scrollIntoView({inline:'center',block:'nearest'});}catch(e){}
}
function boot(data){
  DATA=data;
  wireFilters();
  const forceOsm=location.search.indexOf('osm')>=0;
  const NAVER_KEY=forceOsm?"":(data.naverKey||"").trim();
  if(NAVER_KEY){
    const s=document.createElement('script');
    s.src='https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId='+encodeURIComponent(NAVER_KEY);
    s.onload=initNaver;
    s.onerror=()=>{const l=document.createElement('script');l.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';l.onload=initLeaflet;document.body.appendChild(l);};
    document.body.appendChild(s);
  }else{
    const l=document.createElement('script');l.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';l.onload=initLeaflet;document.body.appendChild(l);
  }
}
</script>
